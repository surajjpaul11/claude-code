services:
  claude:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: claude-code
    stdin_open: true    # Keep STDIN open for interactive mode
    tty: true           # Allocate a pseudo-TTY
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GIT_AUTHOR_NAME=${GIT_AUTHOR_NAME:-Claude User}
      - GIT_AUTHOR_EMAIL=${GIT_AUTHOR_EMAIL:-claude@example.com}
      - GIT_COMMITTER_NAME=${GIT_AUTHOR_NAME:-Claude User}
      - GIT_COMMITTER_EMAIL=${GIT_AUTHOR_EMAIL:-claude@example.com}
    volumes:
      # Persist Claude Code auth/config between restarts
      - claude-config:/home/claude/.claude
      # Workspace for cloned projects
      - workspace:/home/claude/workspace
      # Mount host SSH keys for git operations (read-only)
      - ${HOME}/.ssh:/home/claude/.ssh:ro

volumes:
  claude-config:
  workspace:
